<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - LibriNet</title>
    <script src="https://kit.fontawesome.com/93f4cc41cc.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="registration.css">
</head>
<body>
    <div class="container">
        <h3><i class="fa-solid fa-book-open"></i> LibriNet Library System</h3>
        <h1>Create Student Account</h1>
        <p>Register as a student to access the digital library</p>

        <div class="form">
            <i class="fa-solid fa-user-graduate" id="icon"></i>
            <h2>Student Register</h2>

            <div class="form_input">
                <form onsubmit="return saveStudentRegistration(event)">

                    <h5>Full Name:</h5>
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="regName" placeholder="Enter full name" required minlength="3">
                    </div>

                    <h5>Student ID:</h5>
                    <div class="input-box">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="regId" placeholder="e.g. NSR/0000/00" required>
                    </div>

                    <h5>Email:</h5>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Enter email" required>
                    </div>

                    <h5>Department:</h5>
                    <div class="input-box">
                        <i class="fa-solid fa-building-columns"></i>
                        <input type="text" id="regDept" placeholder="Enter department" required>
                    </div>

                    <h5>Year of Study:</h5>
                    <select id="regYear" required>
                        <option value="">Select Year</option>
                        <option value="Year 1">Year 1</option>
                        <option value="Year 2">Year 2</option>
                        <option value="Year 3">Year 3</option>
                        <option value="Year 4">Year 4</option>
                    </select>

                    <h5>Password:</h5>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Create password" required minlength="6">
                    </div>

                    <h5>Confirm Password:</h5>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm password" required minlength="6">
                    </div>

                    <button type="submit" id="btn">Create Student Account</button>

                    <p style="margin-top: 15px;">Already have an account? <a href="login.html">Login</a></p>
                </form>
            </div>
        </div>
    </div>
    <script>
        function saveStudentRegistration(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const id = document.getElementById('regId').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const dept = document.getElementById('regDept').value.trim();
            const year = document.getElementById('regYear').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return false;
            }

            const newUser = {
                id: id,
                name: name,
                email: email,
                department: dept,
                year: year,
                borrowed: 0,
                returned: 0,
                pending: 0
            };

            localStorage.setItem('currentUser', JSON.stringify(newUser));
            localStorage.setItem('userLoggedIn', 'true');
            alert('Registration successful!');
            window.location.href = "User.html";
            return true;
        }
    </script>
</body>
</html>
